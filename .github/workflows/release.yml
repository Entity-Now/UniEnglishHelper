# Release UniEnglishHelper on version tags (e.g. v1.0.0).
#
# Always:
#   - pnpm install / test / build
#   - zip dist/ → GitHub Release assets
#
# Optional (only if the corresponding repository secrets are set):
#   - Upload to Chrome Web Store
#   - Upload to Microsoft Edge Add-ons
#
# See DOCS/release.md for secret setup.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  build-and-release:
    name: Build & GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      zip_name: ${{ steps.meta.outputs.zip_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag version
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must look like v1.0.0 (got: $TAG)"
            exit 1
          fi
          ZIP_NAME="uni-english-helper-${VERSION}.zip"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${VERSION} zip=${ZIP_NAME}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package.json version with tag
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const version = process.env.VERSION;
            if (pkg.version !== version) {
              console.log('Updating package.json version:', pkg.version, '→', version);
              pkg.version = version;
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            } else {
              console.log('package.json version already matches tag:', version);
            }
          "
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: Typecheck & unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Package dist as zip
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP_NAME="${{ steps.meta.outputs.zip_name }}"
          # Extension package root = dist contents (manifest.json at zip root)
          cd dist
          zip -r -q "../${ZIP_NAME}" .
          cd ..
          ls -lh "${ZIP_NAME}"
          # Keep a copy for optional store jobs
          mkdir -p artifacts
          cp "${ZIP_NAME}" "artifacts/${ZIP_NAME}"
          # Sanity: manifest version
          node -e "
            const m = require('./dist/manifest.json');
            console.log('manifest version:', m.version, 'name:', m.name);
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: artifacts/${{ steps.meta.outputs.zip_name }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: UniEnglishHelper ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.zip_name }}
          body: |
            ## UniEnglishHelper ${{ steps.meta.outputs.tag }}

            ### Install (developer / sideload)

            1. Download `${{ steps.meta.outputs.zip_name }}`
            2. Unzip to a folder
            3. Chrome / Edge → Extensions → **Developer mode** → **Load unpacked** → select the folder

            ### Store publishing

            If repository secrets are configured, this tag may also trigger upload jobs for:
            - Chrome Web Store
            - Microsoft Edge Add-ons

            See `DOCS/release.md` for credentials and first-time store setup.

            ---
            Built from `${{ github.sha }}` on `${{ github.repository }}`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Chrome Web Store (optional)
  # Required secrets: CHROME_EXTENSION_ID, CHROME_CLIENT_ID,
  #   CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN
  # ---------------------------------------------------------------------------
  publish-chrome:
    name: Publish Chrome Web Store
    needs: build-and-release
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_CHROME_PUBLISH == 'true' }}
    steps:
      - name: Download zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: artifacts

      - name: Upload to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: ${{ vars.CHROME_PUBLISH_ACTION || 'upload' }}
          # upload | publish | personal  — see action docs
          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
          zip_file: artifacts/${{ needs.build-and-release.outputs.zip_name }}

  # ---------------------------------------------------------------------------
  # Microsoft Edge Add-ons (optional)
  # Required secrets: EDGE_PRODUCT_ID, EDGE_CLIENT_ID, EDGE_API_KEY
  # (API key pair from Partner Center → Edge publish API)
  # ---------------------------------------------------------------------------
  publish-edge:
    name: Publish Edge Add-ons
    needs: build-and-release
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_EDGE_PUBLISH == 'true' }}
    steps:
      - name: Download zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: artifacts

      - name: Upload to Edge Add-ons
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: artifacts/${{ needs.build-and-release.outputs.zip_name }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}
          # upload-only: 'true'  # set if you only want to upload without submit
          # notes-for-certification: 'Automated release from GitHub Actions'
          # Notes: first-time listing must be created manually in Partner Center.
